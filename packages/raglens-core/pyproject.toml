[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "raglens-core"
version = "0.1.0"
description = "Toolkit de avaliação de sistemas RAG (Retrieval-Augmented Generation)"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2",
]

[tool.setuptools.packages.find]
where = ["src"]
